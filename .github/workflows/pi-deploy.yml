name: Portfolio Web - Stage Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Portfolio Web - Check']
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, pi, port-web]
    environment: roscoe-pi-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo '${{ secrets.ENV_FILE }}' > .env

      - name: Install dependencies
        run: |
          npm ci

      - name: Build project
        run: |
          npm run build

      - name: Deploy to staging
        run: |
          # Make sure folder exists
          sudo mkdir -p /var/www/portfolio-web
          # Copy files to the server
          sudo rsync -av --delete ./dist/ /var/www/portfolio-web/
